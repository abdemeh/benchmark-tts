services:
  xtts-api:
    image: coqui-gpu
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: xtts-gpu-api
    ports:
      - "8000:80"
    environment:
      - COQUI_TOS_AGREED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
