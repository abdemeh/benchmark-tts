services:
  voxtral:
    image: vllm/vllm-omni:v0.18.0
    container_name: voxtral-env-voxtral-1
    ports:
      - "8036:8036"
    restart: "no"
    command: >
      vllm serve mistralai/Voxtral-4B-TTS-2603
      --omni
      --host 0.0.0.0
      --port 8036
    environment:
      - HF_HOME=/models
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
